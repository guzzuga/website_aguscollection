<svg width="800" height="1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="url(#bg1)"/>
  
  <!-- Decorative Circle -->
  <circle cx="400" cy="350" r="200" fill="rgba(251,191,36,0.1)"/>
  <circle cx="400" cy="350" r="150" fill="rgba(251,191,36,0.05)"/>
  
  <!-- Product Silhouette (Mermaid Skirt) -->
  <path d="M 300 200 L 500 200 L 520 500 Q 530 600 400 620 Q 270 600 280 500 Z" 
        fill="#1e293b" stroke="url(#gold)" stroke-width="3"/>
  
  <!-- Waist Band -->
  <rect x="300" y="200" width="200" height="40" fill="#0f172a" rx="5"/>
  
  <!-- AGUS COLLECTION Logo -->
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="url(#gold)" text-anchor="middle">AGUS COLLECTION</text>
  
  <!-- Product Name -->
  <text x="400" y="750" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">Rok Mermaid</text>
  <text x="400" y="790" font-family="Arial, sans-serif" font-size="24" 
        fill="#fbbf24" text-anchor="middle">Highwaist Premium</text>
  
  <!-- Price Badge -->
  <rect x="250" y="850" width="300" height="60" rx="30" fill="url(#gold)"/>
  <text x="400" y="888" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#0a0a2e" text-anchor="middle">Rp 45.000 - 69.000</text>
  
  <!-- Features -->
  <text x="400" y="940" font-family="Arial, sans-serif" font-size="16" 
        fill="#94a3b8" text-anchor="middle">✅ Premium Stretch Fabric</text>
  <text x="400" y="965" font-family="Arial, sans-serif" font-size="16" 
        fill="#94a3b8" text-anchor="middle">✅ Anti Kusut | Highwaist Fit</text>
  
  <!-- NEW BADGE -->
  <rect x="50" y="50" width="120" height="50" rx="25" fill="#ef4444"/>
  <text x="110" y="82" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        fill="#ffffff" text-anchor="middle">NEW ARRIVAL</text>
</svg>